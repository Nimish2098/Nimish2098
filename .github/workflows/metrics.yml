name: Metrics
on:
  # Schedule updates (e.g., every 12 hours)
  schedule: [{cron: "0 */12 * * *"}]
  # Lines below allow manual triggers and run on every push
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: Nimish2098
          template: classic
          base: "" # Set to "" if you only want the calendar and no other stats
          
          # Isocalendar plugin configuration
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year # Options: half-year or full-year